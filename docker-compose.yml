version: "3.8"

services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-vector
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # RedisInsight
#    environment:
#      - REDIS_ARGS=--appendonly yes
#    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
    external: true
    name: redis_rag_data